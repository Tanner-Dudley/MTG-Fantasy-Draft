services:
  - type: web
    name: mtg-commander-draft
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mtg-draft-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: mtg-draft-db
    plan: free
    databaseName: mtg_draft
